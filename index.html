<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Football Commentary</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:48%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

#start{
background:#28a745;
color:white;
}

#stop{
background:#dc3545;
color:white;
}

.commentary{
margin-top:20px;
height:300px;
overflow-y:auto;
background:#eee;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="container">

<h1>Football Auto Commentary</h1>

<label>Team A</label>
<input id="teamA" placeholder="Team A">

<label>Team B</label>
<input id="teamB" placeholder="Team B">

<label>League</label>
<input id="league" placeholder="League">

<label>Speed</label>
<select id="speed">
<option value="4000">Slow</option>
<option value="2500" selected>Medium</option>
<option value="1500">Fast</option>
</select>

<button id="start">Start</button>
<button id="stop">Stop</button>

<div class="commentary" id="box"></div>

</div>

<script>

let interval=null

const pool=[

"An amazing start by [A] in the [L]!",
"[B] moving the ball forward.",
"Great passing from [A].",
"[B] defending very well.",
"The crowd is cheering loudly.",
"[A] attacking from the wing.",
"[B] trying to counter attack.",
"What a fantastic move by [A]!",
"[B] wins the ball back.",
"[A] building pressure now.",
"A dangerous moment in the [L].",
"[B] pushing higher up the field.",
"Great teamwork from [A].",
"[B] looking for a chance.",
"Brilliant control by [A].",
"[B] attempting a long shot!",
"What a pass from [A]!",
"[B] nearly scores!",
"Fantastic save!",
"The match is getting intense!"

]

function line(a,b,l){

let t=pool[Math.floor(Math.random()*pool.length)]

return t.replace(/\[A\]/g,a)
.replace(/\[B\]/g,b)
.replace(/\[L\]/g,l)

}

function speak(text){

let u=new SpeechSynthesisUtterance(text)

u.lang="en-US"

u.rate=1
u.pitch=1

speechSynthesis.cancel()   // mobile fix
speechSynthesis.speak(u)

}

function start(){

if(interval) return

let a=document.getElementById("teamA").value||"Team A"
let b=document.getElementById("teamB").value||"Team B"
let l=document.getElementById("league").value||"League"
let speed=parseInt(document.getElementById("speed").value)

let box=document.getElementById("box")

interval=setInterval(()=>{

let text=line(a,b,l)

let p=document.createElement("p")
p.textContent=text

box.appendChild(p)

box.scrollTop=box.scrollHeight

speak(text)

},speed)

}

function stop(){

clearInterval(interval)

interval=null

speechSynthesis.cancel()

}

document.getElementById("start").onclick=start
document.getElementById("stop").onclick=stop

</script>

</body>
</html>
