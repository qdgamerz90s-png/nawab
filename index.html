<script>
const commentaryPool = [
"An incredible start from [TeamA] in the [League]!",
"[TeamB] is pushing forward with full force.",
"What a fantastic pass by [TeamA]!",
"Terrific interception by [TeamB]'s defender.",
"[TeamA] showing brilliant teamwork here.",
"Spectacular save from [TeamB]'s goalkeeper!",
"The crowd is going wild for [TeamA]!",
"Can [TeamB] turn the game around?",
"Absolute brilliance by [TeamA] on the attack.",
"A tense moment in the [League] match."
];

let commentaryInterval;
let commentaryQueue = [];
let isSpeaking = false;

const speech = window.speechSynthesis;
let voices = [];

// Load voices (important for mobile)
function loadVoices(){
    voices = speech.getVoices();
}

speech.onvoiceschanged = loadVoices;

function generateCommentary(teamA, teamB, league){
    const line = commentaryPool[Math.floor(Math.random()*commentaryPool.length)];

    return line.replace(/\[TeamA\]/g, teamA)
               .replace(/\[TeamB\]/g, teamB)
               .replace(/\[League\]/g, league);
}

function speakNext(){

    if(commentaryQueue.length === 0){
        isSpeaking = false;
        return;
    }

    isSpeaking = true;

    const text = commentaryQueue.shift();

    const utter = new SpeechSynthesisUtterance(text);

    utter.lang = "en-US";

    if(voices.length > 0){
        utter.voice = voices[0];
    }

    utter.rate = 1;
    utter.pitch = 1;

    utter.onend = function(){
        speakNext();
    };

    speech.speak(utter);
}

function startCommentary(){

    const teamA = document.getElementById("teamA").value || "Team A";
    const teamB = document.getElementById("teamB").value || "Team B";
    const league = document.getElementById("league").value || "League";

    const speed = parseInt(document.getElementById("speed").value);

    const box = document.getElementById("commentaryBox");

    if(commentaryInterval) return;

    const firstLine = generateCommentary(teamA, teamB, league);

    commentaryQueue.push(firstLine);

    const p = document.createElement("p");
    p.textContent = firstLine;

    box.appendChild(p);

    if(!isSpeaking){
        speakNext();
    }

    commentaryInterval = setInterval(()=>{

        const line = generateCommentary(teamA,teamB,league);

        commentaryQueue.push(line);

        const p = document.createElement("p");

        p.textContent = line;

        box.appendChild(p);

        box.scrollTop = box.scrollHeight;

        if(!isSpeaking){
            speakNext();
        }

    },speed);
}

function stopCommentary(){

    clearInterval(commentaryInterval);

    commentaryInterval = null;

    speech.cancel();

    commentaryQueue = [];

    isSpeaking = false;
}

document.getElementById("start").addEventListener("click", startCommentary);
document.getElementById("stop").addEventListener("click", stopCommentary);
</script>
