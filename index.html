<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Football Commentary</title>

<style>

body{
font-family:Arial;
background:#f0f2f5;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h1{
text-align:center;
}

label{
margin-top:10px;
display:block;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:48%;
padding:12px;
margin-top:20px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

#start{
background:#28a745;
color:white;
}

#stop{
background:#dc3545;
color:white;
}

.commentary{
margin-top:20px;
height:320px;
overflow-y:auto;
background:#eee;
padding:10px;
border-radius:6px;
}

p{
margin:5px 0;
}

</style>
</head>

<body>

<div class="container">

<h1>Football Auto Commentary</h1>

<label>Team A</label>
<input id="teamA" placeholder="Team A">

<label>Team B</label>
<input id="teamB" placeholder="Team B">

<label>League</label>
<input id="league" placeholder="League">

<label>Commentary Speed</label>
<select id="speed">
<option value="4000">Slow</option>
<option value="2500" selected>Medium</option>
<option value="1500">Fast</option>
</select>

<button id="start">Start</button>
<button id="stop">Stop</button>

<div class="commentary" id="box"></div>

</div>

<script>

let voices=[]
let commentaryInterval=null
let lastLine=""

const commentaryPool=[

"A great start in the [L]!",
"[A] moving forward confidently.",
"[B] defending strongly.",
"What a brilliant pass from [A]!",
"[B] trying to build an attack.",
"The crowd is loving this match!",
"[A] attacking down the wing.",
"[B] wins the ball back.",
"A fantastic move from [A]!",
"[B] attempts a dangerous shot.",
"[A] controlling possession.",
"[B] pushing higher up the field.",
"The pressure is building!",
"[A] nearly scores!",
"[B] clears the danger.",
"What a save by the goalkeeper!",
"[A] creating another chance.",
"[B] struggling to keep possession.",
"A tense moment in the match.",
"The fans are roaring in the stadium!"

]

function loadVoices(){
voices = speechSynthesis.getVoices()
}

speechSynthesis.onvoiceschanged = loadVoices

function speak(text){

let utter = new SpeechSynthesisUtterance(text)

utter.lang="en-US"

if(voices.length>0){
utter.voice = voices[0]
}

utter.rate=1
utter.pitch=1

speechSynthesis.cancel()
speechSynthesis.speak(utter)

}

function generateCommentary(a,b,l){

let line

do{
line=commentaryPool[Math.floor(Math.random()*commentaryPool.length)]
}while(line===lastLine)

lastLine=line

return line
.replace(/\[A\]/g,a)
.replace(/\[B\]/g,b)
.replace(/\[L\]/g,l)

}

function startCommentary(){

if(commentaryInterval) return

let a=document.getElementById("teamA").value || "Team A"
let b=document.getElementById("teamB").value || "Team B"
let l=document.getElementById("league").value || "League"

let speed=parseInt(document.getElementById("speed").value)

let box=document.getElementById("box")

// mobile audio unlock
speechSynthesis.speak(new SpeechSynthesisUtterance("Match starting"))

commentaryInterval=setInterval(()=>{

let text=generateCommentary(a,b,l)

let p=document.createElement("p")
p.textContent=text

box.appendChild(p)

box.scrollTop=box.scrollHeight

speak(text)

},speed)

}

function stopCommentary(){

clearInterval(commentaryInterval)

commentaryInterval=null

speechSynthesis.cancel()

}

document.getElementById("start").addEventListener("click",startCommentary)
document.getElementById("stop").addEventListener("click",stopCommentary)

</script>

</body>
</html>
