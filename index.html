.container { max-width:700px; margin:0 auto; background:#fff; padding:20px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
label { display:block; margin-top:10px; font-weight:bold; }
input, select { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
button { padding:10px 20px; margin-top:20px; width:48%; border:none; border-radius:5px; cursor:pointer; }
button#start { background:#4CAF50; color:#fff; }
button#stop { background:#f44336; color:#fff; }
.commentary-box { margin-top:20px; padding:10px; background:#eee; border-radius:5px; height:300px; overflow-y:auto; }

<div class="container">
<h1>Auto Football Commentary App</h1>

<label>Team A Name</label>
<input type="text" id="teamA" placeholder="Enter Team A Name">

<label>Team B Name</label>
<input type="text" id="teamB" placeholder="Enter Team B Name">

<label>League Name</label>
<input type="text" id="league" placeholder="Enter League Name">

<label>Commentary Speed</label>
<select id="speed">
<option value="3000">Slow</option>
<option value="2000" selected>Medium</option>
<option value="1000">Fast</option>
</select>

<button id="start">Start Commentary</button>
<button id="stop">Stop Commentary</button>

<div class="commentary-box" id="commentaryBox"></div>

// JS logic for TTS
let commentaryInterval;
let speech = window.speechSynthesis;

function generateCommentary(teamA, teamB, league) {
    const line = commentaryPool[Math.floor(Math.random() * commentaryPool.length)];
    return line.replace(/\[TeamA\]/g, teamA)
               .replace(/\[TeamB\]/g, teamB)
               .replace(/\[League\]/g, league);
}

function startCommentary() {
    const teamA = document.getElementById('teamA').value || "Team A";
    const teamB = document.getElementById('teamB').value || "Team B";
    const league = document.getElementById('league').value || "League";
    const speed = parseInt(document.getElementById('speed').value);

    commentaryInterval = setInterval(() => {
        const line = generateCommentary(teamA, teamB, league);

        const box = document.getElementById('commentaryBox');
        const p = document.createElement('p');
        p.textContent = line;
        box.appendChild(p);
        box.scrollTop = box.scrollHeight;

        const utter = new SpeechSynthesisUtterance(line);
        utter.lang = 'en-US';
        speech.speak(utter);
    }, speed);
}

function stopCommentary() {
    clearInterval(commentaryInterval);
    speech.cancel();
}

document.getElementById('start').addEventListener('click', startCommentary);
document.getElementById('stop').addEventListener('click', stopCommentary);
